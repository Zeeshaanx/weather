upstream weather_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Strip /weather prefix and proxy to FastAPI
    # FastAPI sees the request with root_path=/weather so all URLs render correctly
    location /weather {
        proxy_pass         http://weather_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass original URL prefix so FastAPI can build absolute URLs correctly
        proxy_set_header   X-Forwarded-Prefix /weather;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Redirect root to /weather/home
    location = / {
        return 301 /weather/home;
    }

    # Health check endpoint
    location = /healthz {
        proxy_pass http://weather_app/health;
    }
}
